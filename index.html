<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos de Corrida</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1e1e1e;
            color: white;
        }

        h1 {
            color: red;
        }

        .jogos {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: darkred;
        }
    </style>
</head>
<body>

    <h1>🏎️ Jogos de Corrida</h1>

    <div class="jogos">

        <div class="card">
            <h2>Forza Horizon 5</h2>
            <p>Corridas em mundo aberto.</p>
            <a href="https://forza.net" target="_blank">Acessar</a>
        </div>

        <div class="card">
            <h2>Gran Turismo 7</h2>
            <p>Simulação de corrida.</p>
            <a href="https://www.gran-turismo.com" target="_blank">Acessar</a>
        </div>

        <div class="card">
            <h2>Assetto Corsa</h2>
            <p>Simulador realista.</p>
            <a href="https://assettocorsa.gg" target="_blank">Acessar</a>
        </div>

        <div class="card">
            <h2>F1 25</h2>
            <p>Jogo oficial da Fórmula 1.</p>
            <a href="https://www.ea.com/games/f1" target="_blank">Acessar</a>
        </div>

    </div>

</body>
</html>
